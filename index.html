<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>괌 여행 체크리스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f0ebe3;
    color: #2d2d2d;
    min-height: 100vh;
    padding: 20px;
  }
  .header {
    text-align: center;
    padding: 40px 20px 30px;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 800;
    color: #1a5276;
    letter-spacing: -1px;
  }
  .header .subtitle {
    font-size: 0.95rem;
    color: #7f8c8d;
    margin-top: 8px;
    font-weight: 300;
  }
  .header .members {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .member-tag {
    background: white;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .member-tag.dad { border-left: 3px solid #3498db; }
  .member-tag.mom { border-left: 3px solid #e91e63; }
  .member-tag.baby { border-left: 3px solid #ff9800; }
  .flight-info {
    display: inline-block;
    background: #1a5276;
    color: white;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 0.8rem;
    margin-top: 14px;
    font-weight: 400;
    letter-spacing: 0.5px;
  }
  .progress-bar {
    max-width: 700px;
    margin: 20px auto;
    background: #ddd;
    border-radius: 10px;
    height: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #1a5276, #2ecc71);
    border-radius: 10px;
    transition: width 0.5s ease;
  }
  .progress-text {
    text-align: center;
    font-size: 0.8rem;
    color: #7f8c8d;
    margin-top: 6px;
    margin-bottom: 20px;
  }
  .container { max-width: 700px; margin: 0 auto; }
  .section {
    background: white;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    transition: transform 0.2s;
  }
  .section:hover { transform: translateY(-2px); }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 1rem;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #1a5276;
  }
  .section-title .icon { font-size: 1.3rem; }
  .section-meta { display: flex; align-items: center; gap: 8px; }
  .badge {
    font-size: 0.65rem;
    background: #e74c3c;
    color: white;
    padding: 2px 8px;
    border-radius: 8px;
    font-weight: 600;
    animation: pulse 2s infinite;
  }
  .badge.done { background: #2ecc71; animation: none; }
  .count-badge {
    font-size: 0.65rem;
    background: #ecf0f1;
    color: #7f8c8d;
    padding: 2px 8px;
    border-radius: 8px;
    font-weight: 400;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .item {
    display: flex;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid #f5f5f5;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }
  .item:last-child { border-bottom: none; }
  .item .checkbox {
    width: 22px; height: 22px; min-width: 22px;
    border: 2px solid #bdc3c7;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
    transition: all 0.2s;
    font-size: 0.75rem;
    color: transparent;
  }
  .item.checked .checkbox {
    background: #2ecc71;
    border-color: #2ecc71;
    color: white;
  }
  .item.checked .item-text {
    color: #aaa;
    text-decoration: line-through;
  }
  .item-content { flex: 1; }
  .item-text {
    font-size: 0.9rem;
    font-weight: 400;
    transition: all 0.2s;
    line-height: 1.5;
  }
  .item-note {
    font-size: 0.75rem;
    color: #e67e22;
    margin-top: 3px;
    font-weight: 300;
  }
  .item-note.tip { color: #3498db; }
  .footer {
    text-align: center;
    padding: 30px 20px;
    font-size: 0.75rem;
    color: #bdc3c7;
  }
  .legend {
    max-width: 700px;
    margin: 0 auto 20px;
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    font-size: 0.75rem;
    color: #7f8c8d;
  }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.red { background: #e74c3c; }
  .dot.green { background: #2ecc71; }
  .dot.orange { background: #e67e22; }
  .dot.blue { background: #3498db; }
  .reset-btn {
    display: block;
    max-width: 200px;
    margin: 0 auto 30px;
    padding: 10px 20px;
    background: none;
    border: 1px solid #bdc3c7;
    border-radius: 10px;
    color: #95a5a6;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: #e74c3c; color: #e74c3c; }
</style>
</head>

var container = document.getElementById('checklistContainer');
var STORAGE_KEY = 'guam_v2';
var saved = {};
try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { saved = {}; }

function updateProgress() {
  var items = document.querySelectorAll('.item');
  var total = items.length, checked = 0;
  for (var i = 0; i < items.length; i++) {
    if (items[i].classList.contains('checked')) checked++;
  }
  var pct = Math.round((checked / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = checked + ' / ' + total + ' 완료 (' + pct + '%)';
}

for (var si = 0; si < data.length; si++) {
  var section = data[si];
  var div = document.createElement('div');
  div.className = 'section';

  var itemCount = section.items.length;
  var allChecked = true;
  for (var ci = 0; ci < section.items.length; ci++) {
    var k = si + '-' + ci;
    var c = saved[k] !== undefined ? saved[k] : section.items[ci].checked;
    if (!c) { allChecked = false; break; }
  }

  div.innerHTML =
    '<div class="section-header">' +
      '<div class="section-title">' +
        '<span class="icon">' + section.icon + '</span>' +
        section.title +
      '</div>' +
      '<div class="section-meta">' +
        '<span class="count-badge">' + itemCount + '개</span>' +
        '<span class="badge ' + (allChecked ? 'done' : '') + '">' + (allChecked ? '완료' : '미완료') + '</span>' +
      '</div>' +
    '</div>';

  for (var ii = 0; ii < section.items.length; ii++) {
    var item = section.items[ii];
    var key = si + '-' + ii;
    var isChecked = saved[key] !== undefined ? saved[key] : item.checked;

    var row = document.createElement('div');
    row.className = 'item' + (isChecked ? ' checked' : '');
    row.setAttribute('data-key', key);

    var noteClass = 'item-note';
    if (item.tip) noteClass += ' tip';

    row.innerHTML =
      '<div class="checkbox">✓</div>' +
      '<div class="item-content">' +
        '<div class="item-text">' + item.text + '</div>' +
        (item.note ? '<div class="' + noteClass + '">' + item.note + '</div>' : '') +
      '</div>';

    (function(row, key, div) {
      row.addEventListener('click', function() {
        row.classList.toggle('checked');
        var nowChecked = row.classList.contains('checked');
        saved[key] = nowChecked;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
        updateProgress();
        var sectionItems = div.querySelectorAll('.item');
        var sAll = true;
        for (var j = 0; j < sectionItems.length; j++) {
          if (!sectionItems[j].classList.contains('checked')) { sAll = false; break; }
        }
        var badge = div.querySelector('.badge');
        badge.textContent = sAll ? '완료' : '미완료';
        badge.className = 'badge ' + (sAll ? 'done' : '');
      });
    })(row, key, div);

    div.appendChild(row);
  }
  container.appendChild(div);
}
updateProgress();
</script>
</body>
</html>
